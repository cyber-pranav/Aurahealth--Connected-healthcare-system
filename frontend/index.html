<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aura Health Systems - A centralized healthcare coordination platform for seamless communication between patients and doctors." />
    <title>Aura Health Systems</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-high": "#e7e8ea",
              "surface-container-lowest": "#ffffff",
              "surface-container": "#ecedee",
              "surface-container-low": "#f2f2f3",
              "on-surface": "#191c1d",
              "on-surface-variant": "#3f484b",
              "primary": "#006b5e",
              "primary-light": "#00a98f",
              "on-primary": "#ffffff",
              "primary-container": "#70f8dd",
              "on-primary-container": "#00201b",
              "secondary": "#4b635d",
              "on-secondary": "#ffffff",
              "secondary-container": "#cee9e0",
              "on-secondary-container": "#07201b",
              "tertiary": "#426278",
              "on-tertiary": "#ffffff",
              "tertiary-container": "#c7e7ff",
              "on-tertiary-container": "#001e30",
              "error": "#ba1a1a",
              "on-error": "#ffffff",
              "error-container": "#ffdad6",
              "on-error-container": "#410002",
              "surface": "#f8faf8",
              "outline": "#6f797b",
              "outline-variant": "#bfc8cb",
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            borderRadius: {
              'xl': '16px',
              '2xl': '24px',
              '3xl': '28px',
            },
            boxShadow: {
              'elevation-1': '0 1px 3px 1px rgba(0,0,0,0.15), 0 1px 2px rgba(0,0,0,0.3)',
              'elevation-2': '0 2px 6px 2px rgba(0,0,0,0.15), 0 1px 2px rgba(0,0,0,0.3)',
              'elevation-3': '0 4px 8px 3px rgba(0,0,0,0.15), 0 1px 3px rgba(0,0,0,0.3)',
            }
          }
        }
      }
    </script>
    <style>
      * { font-family: 'Inter', system-ui, sans-serif; }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .material-symbols-outlined.filled {
        font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
    </style>
  </head>
  <body class="bg-surface text-on-surface">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
