# cloudbuild.yaml — Builds and deploys both services to Google Cloud Run
# Triggered automatically when you push to GitHub (if connected)
# Or run manually: gcloud builds submit

substitutions:
  _REGION: asia-south1          # Mumbai — closest to India, change if needed
  _BACKEND_SERVICE: aura-backend
  _FRONTEND_SERVICE: aura-frontend
  _MONGO_URI: ${_MONGO_URI}    # Pass via --substitutions flag or Secret Manager

steps:
  # ── BACKEND ──────────────────────────────────────────────────────
  # Step 1: Build the backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:latest'
      - './backend'

  # Step 2: Push backend image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    waitFor: ['build-backend']
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}'

  # Step 3: Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    waitFor: ['push-backend']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_BACKEND_SERVICE}'
      - '--image=gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-env-vars=NODE_ENV=production'
      - '--update-secrets=MONGO_URI=aura-mongo-uri:latest,JWT_SECRET=aura-jwt-secret:latest'

  # ── FRONTEND ─────────────────────────────────────────────────────
  # Step 4: Get the backend URL (output of the deploy step)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'get-backend-url'
    waitFor: ['deploy-backend']
    entrypoint: bash
    args:
      - '-c'
      - |
        BACKEND_URL=$(gcloud run services describe ${_BACKEND_SERVICE} \
          --region=${_REGION} --format='value(status.url)')
        echo "Backend URL: $$BACKEND_URL"
        echo $$BACKEND_URL > /workspace/backend_url.txt

  # Step 5: Build frontend with the real backend URL injected
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    waitFor: ['get-backend-url']
    entrypoint: bash
    args:
      - '-c'
      - |
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        docker build \
          --build-arg VITE_API_URL=$$BACKEND_URL \
          -t gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:$COMMIT_SHA \
          -t gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:latest \
          ./frontend

  # Step 6: Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    waitFor: ['build-frontend']
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}'

  # Step 7: Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    waitFor: ['push-frontend']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_FRONTEND_SERVICE}'
      - '--image=gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'

images:
  - 'gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
